name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Builds from TenderTool.spec (same spec used for the macOS .app). The spec's
      # BUNDLE step is macOS-only and PyInstaller skips it on Windows, producing a
      # dist/TenderTool/ folder containing TenderTool.exe + its _internal payload.
      - name: Build EXE
        run: pyinstaller TenderTool.spec --noconfirm --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TenderTool-Windows
          path: dist/TenderTool
