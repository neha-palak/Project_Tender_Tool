name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # - name: Build EXE
      #   run: |
      #     pyinstaller --windowed ^
      #       --name TenderTool ^
      #       --add-data "Website;Website" ^
      #       desktop_app.py
      # - name: Build EXE
      #   run: >
      #     pyinstaller
      #     --windowed
      #     --name TenderTool
      #     --add-data "Website;Website"
      #     desktop_app.py
      - name: Build EXE
        run: pyinstaller --windowed --name TenderTool --hidden-import Websitecopy.server --add-data "Websitecopy;Websitecopy" desktop_app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TenderTool-Windows
          path: dist/
